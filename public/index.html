<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Transaction</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="page-bg"></div>

  <main class="page">
    <section class="panel">
      <div class="panel-head">
        <div>
          <div class="panel-title">LIVE TRANSACTION</div>
          <div class="panel-subtitle">Auto sync from source</div>
        </div>

        <div class="live-status">
          <span class="live-dot"></span>
          <span>LIVE</span>
        </div>
      </div>

      <div class="toolbar">
        <div class="toolbar-item" id="syncTime">Last sync: loading...</div>
        <div class="toolbar-item" id="syncState">Status: connecting...</div>
      </div>

      <div class="table-shell">
        <table class="live-table">
          <thead>
            <tr>
              <th colspan="2" class="head-topup">TOP UP</th>
              <th colspan="3" class="head-withdraw">WITHDRAW</th>
            </tr>
          </thead>
        </table>

        <div class="table-scroll" id="tableScroll">
          <table class="live-table live-table-body">
            <tbody id="liveBody">
              <tr>
                <td colspan="5" class="empty">Loading live data...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script src="/script.js"></script>
</body>
</html>
